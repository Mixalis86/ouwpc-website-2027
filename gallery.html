<style>
  .photo-masonry {
    columns: 4;
    column-gap: 0.6rem;
  }
  .photo-masonry-item {
    break-inside: avoid;
    margin-bottom: 0.6rem;
    overflow: hidden;
    border-radius: var(--radius);
    cursor: pointer;
    display: block;
    position: relative;
  }
  .photo-masonry-item img {
    width: 100%;
    display: block;
    transition: transform 0.35s var(--ease), filter 0.35s;
  }
  .photo-masonry-item:hover img {
    transform: scale(1.04);
    filter: brightness(0.82);
  }

  @media (max-width: 900px) { .photo-masonry { columns: 3; } }
  @media (max-width: 600px) { .photo-masonry { columns: 2; } }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 500;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .lightbox.is-open { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    border-radius: var(--radius);
    display: block;
  }
  .lightbox-close {
    position: absolute;
    top: 1.2rem;
    right: 1.4rem;
    background: none;
    border: none;
    color: white;
    font-size: 2rem;
    cursor: pointer;
    line-height: 1;
    opacity: 0.8;
  }
  .lightbox-close:hover { opacity: 1; }
  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.12);
    border: none;
    color: white;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .lightbox-nav:hover { background: rgba(255,255,255,0.25); }
  .lightbox-prev { left: 1.2rem; }
  .lightbox-next { right: 1.2rem; }
  .lightbox-counter {
    margin-top: 0.8rem;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.06em;
  }
</style>

<script src="js/main.js"></script>
<script>
  // Lightbox
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const lightboxCounter = document.getElementById('lightbox-counter');

  const galleries = { varsity: [], alumni: [] };

  document.querySelectorAll('.photo-masonry-item').forEach(item => {
    const gallery = item.dataset.gallery;
    const index = parseInt(item.dataset.index);
    const src = item.querySelector('img').src;
    galleries[gallery][index] = src;

    item.addEventListener('click', () => openLightbox(gallery, index));
  });

  let currentGallery = '';
  let currentIndex = 0;

  function openLightbox(gallery, index) {
    currentGallery = gallery;
    currentIndex = index;
    updateLightbox();
    lightbox.classList.add('is-open');
    document.body.style.overflow = 'hidden';
  }

  function updateLightbox() {
    const srcs = galleries[currentGallery].filter(Boolean);
    lightboxImg.src = galleries[currentGallery][currentIndex];
    lightboxCounter.textContent = (currentIndex + 1) + ' / ' + srcs.length;
  }

  document.getElementById('lightbox-close').addEventListener('click', () => {
    lightbox.classList.remove('is-open');
    document.body.style.overflow = '';
  });

  document.getElementById('lightbox-prev').addEventListener('click', () => {
    const srcs = galleries[currentGallery].filter(Boolean);
    currentIndex = (currentIndex - 1 + srcs.length) % srcs.length;
    updateLightbox();
  });

  document.getElementById('lightbox-next').addEventListener('click', () => {
    const srcs = galleries[currentGallery].filter(Boolean);
    currentIndex = (currentIndex + 1) % srcs.length;
    updateLightbox();
  });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('is-open')) return;
    if (e.key === 'Escape') { lightbox.classList.remove('is-open'); document.body.style.overflow = ''; }
    if (e.key === 'ArrowLeft') document.getElementById('lightbox-prev').click();
    if (e.key === 'ArrowRight') document.getElementById('lightbox-next').click();
  });

  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) { lightbox.classList.remove('is-open'); document.body.style.overflow = ''; }
  });
</script>
